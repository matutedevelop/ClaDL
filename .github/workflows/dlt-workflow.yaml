name: dlt-workflow

on:
  workflow_dispatch:   # para poder correrlo manual primero

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ghbot

      - name: Test connectivity
        run: tailscale ping --c 3 --until-direct=false clarovent

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run dlt pipeline
        env:
          SOURCES__SQL_DATABASE__CREDENTIALS__DRIVERNAME: ${{ secrets.SOURCES__SQL_DATABASE__CREDENTIALS__DRIVERNAME }}
          SOURCES__SQL_DATABASE__CREDENTIALS__DATABASE: ${{ secrets.SOURCES__SQL_DATABASE__CREDENTIALS__DATABASE }}
          SOURCES__SQL_DATABASE__CREDENTIALS__USERNAME: ${{ secrets.SOURCES__SQL_DATABASE__CREDENTIALS__USERNAME }}
          SOURCES__SQL_DATABASE__CREDENTIALS__PASSWORD: ${{ secrets.SOURCES__SQL_DATABASE__CREDENTIALS__PASSWORD }}
          SOURCES__SQL_DATABASE__CREDENTIALS__HOST: ${{ secrets.SOURCES__SQL_DATABASE__CREDENTIALS__HOST }}
          SOURCES__SQL_DATABASE__CREDENTIALS__PORT: ${{ secrets.SOURCES__SQL_DATABASE__CREDENTIALS__PORT }}

          DESTINATION__POSTGRES__CREDENTIALS__DATABASE: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS__DATABASE }}
          DESTINATION__POSTGRES__CREDENTIALS__USERNAME: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS__USERNAME }}
          DESTINATION__POSTGRES__CREDENTIALS__PASSWORD: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS__PASSWORD }}
          DESTINATION__POSTGRES__CREDENTIALS__HOST: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS__HOST }}
          DESTINATION__POSTGRES__CREDENTIALS__PORT: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS__PORT }}
          DESTINATION__POSTGRES__CREDENTIALS__CONNECT_TIMEOUT: ${{ secrets.DESTINATION__POSTGRES__CREDENTIALS__CONNECT_TIMEOUT }}
        run: python pipeline.py
