name: dlt-workflow

on:
  workflow_dispatch:   # para poder correrlo manual primero

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ghBot

      - name: Test connectivity
        run: tailscale ping --c 3 TU_HOST_DE_NEON

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run dlt pipeline
        env:
          SOURCES__SQL_DATABASE__CREDENTIALS: ${{ secrets.SRC_DB_CONNSTRING }}
          DESTINATION__POSTGRES__CREDENTIALS: ${{ secrets.DEST_PG_CONNSTRING }}
        run: python tu_miniscript.py
